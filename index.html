<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Frota</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
</head>
<body>
    <header class="top-bar">
        <h1>🚗 Checklist de Veículos</h1>
        <p>Registro fotográfico diário</p>
    </header>

    <main class="container">
        <section class="upload-section">
            <label for="fileInput" class="upload-btn">
                <span>📸 Adicionar Fotos do Veículo</span>
                <input type="file" id="fileInput" accept="image/*" multiple>
            </label>
            <div id="loading" class="loading hidden">Enviando para o ImgBB... Aguarde.</div>
        </section>

        <section id="galleryContainer" class="gallery-container">
            </section>
    </main>

    <script src="app.js"></script>
    <script>
        // Registro do Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
